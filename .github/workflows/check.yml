name: Check

on:
  - pull_request

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '4.1'
          - '4.0'
          - '3.4'
          - '3.3'
          - '3.2'
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1.310.0
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - run: bundle exec rake
